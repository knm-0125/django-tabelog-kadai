<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <title>レビュー投稿</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>{{ shop.name }} のレビュー投稿</h1>

            <form method="post">
                {% csrf_token %}

                <p>
                    <label>評価</label><br>
                    <input type="number" name="score" min="1" max="5">
                </p>

                <p>
                    <label>コメント</label><br>
                    <textarea name="comment" rows="5"></textarea>
                </p>

                <button type="submit" class="btn">投稿する</button>
            </form>

            <br>
            <a href="/shop/{{ shop.id }}/">戻る</a>
        </div>
    </div>
</body>
</html>
