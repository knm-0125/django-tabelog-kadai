<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>レビュー投稿</title>
</head>
<body>
    <h1>{{ shop.name }} のレビュー投稿</h1>

    <form method="post">
        {% csrf_token %}

        <p>
            <label>評価</label>
            <input type="number" name="score" min="1" max="5">
        </p>

        <p>
            <label>コメント</label><br>
            <textarea name="comment"></textarea>
        </p>

        <button type="submit">投稿する</button>
    </form>

    <a href="/shop/{{ shop.id }}/">戻る</a>
</body>
</html>
