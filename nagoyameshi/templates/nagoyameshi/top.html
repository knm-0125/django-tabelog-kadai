<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>NAGOYAMESHI トップページ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f8f8f8;
        }

        header {
            background-color: #ff8c42;
            color: white;
            padding: 20px;
        }

        .container {
            width: 80%;
            margin: 30px auto;
        }

        .nav-links {
            margin-bottom: 20px;
        }

        .nav-links a {
            margin-right: 15px;
            text-decoration: none;
            color: #ff8c42;
            font-weight: bold;
        }

        .search-box {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .search-box input,
        .search-box select,
        .search-box button {
            padding: 8px;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .shop-card {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0,1);
        }

        .shop-card h2 {
            margin-top: 0;
        }
        
        .shop-card a {
            text-decoration: none;
            color: #333;
        }

        .shop-card a:hover {
            color: #ff8c42;
        }

        .auth-links {
            margin-bottom: 15px;
        }

        .auth-links a {
            margin-right: 12px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
{% if user.is_authenticated %}
    <p>こんにちは、{{ user.username }}さん</p>
    <a href="/logout/">ログアウト</a>
{% else %}
    <a href="/login/">ログイン</a>
    <a href="/register/">新規登録</a>
{% endif %}
    </header>
    
    <h1>NAGOYAMESHI トップページ</h1>

    <a href="/favorites/">お気に入り一覧</a>

    <form method="get" action="/">
        <input type="text" name="keyword" placeholder="店名で検索">

        <select name="category">
            <option value="">すべてのカテゴリ</option>
            {% for category in categories %}
                <option value="{{ category.id }}">{{ category.name }}</option>
            {% endfor %}
        </select>

        <select name="sort">
            <option value="">並び替えなし</option>
            <option value="name_asc">名前昇順</option>
            <option value="name_desc">名前降順</option>
            <option value="new">新しい順</option>
            <option value="old">古い順</option>
        </select>

        <button type="submit">検索</button>
    </form>

    {% if user.is_authenticated %}
        <a href="{% url 'reservation_list' %}">予約一覧</a>
    {% endif %}

    {% for shop in shops %}
        <h2>
            <a href="/shop/{{ shop.id }}/">
                {{ shop.name }}
            </a>
        </h2>
        <p>{{ shop.description }}</p>
        <p>{{ shop.address }}</p>
        <hr>
    {% endfor %}
</body>
</html>
