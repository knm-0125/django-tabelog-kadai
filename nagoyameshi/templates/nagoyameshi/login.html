<!DOCTYPE html>
<html lang="ja">
<head>
    <mata charset="UTF-8">
    <title>ログイン</title>
    
</head>
<body>
    <h1>ログイン</h1>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <p>
            <label>ユーザー名</label>
            <input type="text" name="username">
        </p>
        <p>
            <label>パスワード</label>
            <input type="password" name="password">
        </p>
        <button type="submit">ログイン</button>
    </form>

    <a href="/">トップへ戻る</a>

</body>
</html>
