<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <title>ログイン</title>
</head>
<body>

    <!-- ナビバー -->
    <div class="navbar">
        <a href="/">トップ</a>
        <a href="/register/">新規登録</a>
    </div>

    <!-- メイン -->
    <div class="container">
        <div class="card">
            <h1>ログイン</h1>

            <form method="post">
                {% csrf_token %}

                <label>ユーザー名</label>
                <input type="text" name="username" placeholder="ユーザー名">

                <label>パスワード</label>
                <input type="password" name="password" placeholder="パスワード">

                <button type="submit" class="btn">ログイン</button>
            </form>

            <!-- エラー表示 -->
            {% if error %}
                <p style="color:red;">{{ error }}</p>
            {% endif %}

            <br>
            <a href="/">トップへ戻る</a>
        </div>
    </div>

</body>
</html>
